user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    log_format blocked '$remote_addr - BLOCKED - [$time_local] "$request" '
                       '$status - "$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;

    upstream api_server {
        server schwartz-server-1:8000;
        keepalive 32;
    }

    server {
        listen 80 default_server;
        server_name _;

        # ====================================================================
        # БЛОКИРУЕМ ИЗВЕСТНЫЕ ПУТИ СКАНЕРОВ
        # ====================================================================

        location ~ ^/(admin|wp-admin|wp-login|phpmyadmin|config|\.well-known|\.env|\.git|\.DS_Store) {
            access_log /var/log/nginx/blocked.log blocked;
            return 404;
        }

        # Блокируем PHP, ASP и другие опасные расширения
        location ~ \.(php|php3|php4|php5|phtml|asp|aspx|jsp|cgi|exe|sh|bat|cmd|com)$ {
            access_log /var/log/nginx/blocked.log blocked;
            return 404;
        }

        # Блокируем скрытые файлы
        location ~ /\. {
            access_log /var/log/nginx/blocked.log blocked;
            return 404;
        }

        # ====================================================================
        # ИЗВЕСТНЫЕ ПУТИ СКАНЕРОВ С АГРЕССИВНЫМ RATE LIMITING
        # ====================================================================

        location ~ ^/(zc|login|user|admin|api/admin|api/config|actuator|debug) {
            access_log /var/log/nginx/blocked.log blocked;
            return 404;
        }

        # ====================================================================
        # TELEGRAM — MTProto соединение может занимать до 3 минут
        # ====================================================================

        location ~* ^/api/v\d+/telegram/(?:sources/\d+/fetch|resolve|sessions/\d+/check) {
            proxy_pass http://api_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 10s;
            proxy_send_timeout 180s;
            proxy_read_timeout 180s;
        }

        # ====================================================================
        # COLLECT — долгие запросы к VK API / RSS (увеличенный таймаут)
        # ====================================================================

        location ~* ^/(?:api/v\d+/)?(?:collect|analyze|clusters(?:/run|/rebuild)?) {
            proxy_pass http://api_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # ====================================================================
        # ОСНОВНОЙ REVERSE PROXY
        # ====================================================================

        location / {
            # Rate limiting: 10 запросов в минуту, очередь из 5 запросов
            proxy_pass http://api_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Таймауты для защиты от зависания
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # ====================================================================
        # ОБРАБОТКА ОШИБОК
        # ====================================================================

        error_page 404 @not_found;
        location @not_found {
            default_type application/json;
            return 404 '{"error":"Not found"}';
        }
    }
}
