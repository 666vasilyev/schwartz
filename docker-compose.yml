services:
  db:
    image: pgvector/pgvector:pg16
    env_file: .env
    # ports:
    #   - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    env_file: .env
    environment:
      COLLECTOR_BASE_URL: http://client:8080
      HF_HOME: /cache/huggingface
    extra_hosts:
      - "host-gateway:host-gateway"
    volumes:
      - hf_cache:/cache/huggingface
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    env_file: .env
    environment:
      POSTGRES_HOST: db
    extra_hosts:
      - "host-gateway:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      server:
        condition: service_started

volumes:
  hf_cache:

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      server:
        condition: service_started
    restart: unless-stopped
